plugins {
    id 'com.android.application'
}

android {
    namespace 'com.subho760.c_to_app'
    compileSdk 34

    defaultConfig {
        applicationId "com.subho760.c_to_app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // ADD THIS BLOCK: This forces Gradle to allow an APK without Java code
    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation project(':native-lib')
}
