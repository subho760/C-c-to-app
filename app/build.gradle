
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.subho760.c_to_app'
    compileSdk 34

        defaultConfig {
        // 1. SET YOUR PACKAGE NAME HERE (Keep it lowercase with dots)
        applicationId "com.subho760.c_to_app" 
        
        minSdk 21
        targetSdk 34
        
        // 2. SET YOUR VERSION CODE HERE (Must be a whole number: 1, 2, 3...)
        versionCode 1 
        
        // 3. SET YOUR VERSION NAME HERE (The visible version string: "1.0", "2.0")
        versionName "1.0" 
    }


    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    // Links your executable app module directly to your C++ wrapper module
    implementation project(':native-lib')
}
