name: Manual Native Build Engine (APK & AAB)

on:
  workflow_dispatch: # Manual trigger button only

jobs:
  build-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install ImageMagick for Logo Resizing
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Auto-Resize and Deploy App Logo
        run: |
          if [ -f "app_logo_source.png" ]; then
            echo "Source logo located. Generating mipmap buckets..."
            mkdir -p app/src/main/res/mipmap-mdpi
            mkdir -p app/src/main/res/mipmap-hdpi
            mkdir -p app/src/main/res/mipmap-xhdpi
            mkdir -p app/src/main/res/mipmap-xxhdpi
            mkdir -p app/src/main/res/mipmap-xxxhdpi
            
            convert app_logo_source.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert app_logo_source.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert app_logo_source.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert app_logo_source.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert app_logo_source.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            echo "App logo structural scaling completed successfully."
          else
            echo "Warning: app_logo_source.png not found in root directory! Defaulting to existing structural layout."
          fi

      - name: Decrypt and Initialize Production Keystore File
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/Night_Shadow_Main_Key.jks
          if [ -f "app/Night_Shadow_Main_Key.jks" ]; then
            echo "Keystore decrypted successfully."
          else
            echo "Keystore initialization failed!"
            exit 1
          fi

      - name: Grant Build Runner Execution Permissions
        run: chmod +x gradlew

      - name: Compile and Sign Release Artifacts (APK & AAB)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease

      - name: Aggregate and Upload Application Packages
        uses: actions/upload-artifact@v4
        with:
          name: Color-Changer-Release-Builds
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
