name: Build Signed Pure C++ APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

    # Compiles the workspace modules
    - name: Build with Gradle
      run: |
        gradle assembleRelease bundleRelease --stacktrace
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    # Signs the outputs using jarsigner for both files to bypass apksigner certificate bugs
    - name: Sign Android Outputs
      run: |
        # 1. Search the entire project directory for the generated APK (skipping intermediate caches)
        REAL_APK=$(find . -name "*.apk" ! -path "*/intermediates/*" ! -name "*release-key*" | head -n 1)
        echo "--> SUCCESS: Found APK file at: $REAL_APK"

        # 2. Sign the discovered APK target file using jarsigner
        jarsigner -keystore app/release-key.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          "$REAL_APK" \
          "${{ secrets.KEY_ALIAS }}"

        # 3. Optimize and verify the signed APK file using zipalign
        $ANDROID_HOME/build-tools/34.0.0/zipalign -f -v 4 "$REAL_APK" app/build/outputs/app-release-signed.apk

        # 4. Search the entire project directory for the generated AAB bundle file
        REAL_AAB=$(find . -name "*.aab" ! -path "*/intermediates/*" | head -n 1)
        echo "--> SUCCESS: Found AAB file at: $REAL_AAB"

        # 5. Sign the discovered bundle target file
        jarsigner -keystore app/release-key.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          "$REAL_AAB" \
          "${{ secrets.KEY_ALIAS }}"

        # 6. Copy the signed bundle to a clean location for uploading
        mkdir -p app/build/outputs/final-bundle/
        cp "$REAL_AAB" app/build/outputs/final-bundle/app-release-signed.aab

    # Uploads the final signed files directly from the explicit output folders
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK-Download
        path: app/build/outputs/app-release-signed.apk

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-Download
        path: app/build/outputs/final-bundle/app-release-signed.aab
