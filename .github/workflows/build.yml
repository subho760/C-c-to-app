name: Build Signed Pure C++ APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

    # Compiles the workspace modules
    - name: Build with Gradle
      run: |
        gradle assembleRelease bundleRelease --stacktrace
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    # Signs raw outputs using standard text stream ingestion to handle password symbols flawlessly
    - name: Sign Android Outputs
      env:
        KS_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        K_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        K_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        # 1. Search the entire project directory for the generated APK
        REAL_APK=$(find . -name "*.apk" ! -path "*/intermediates/*" ! -name "*release-key*" | head -n 1)
        echo "--> SUCCESS: Found raw APK file at: $REAL_APK"

        # 2. Sign the raw APK file by piping the credentials directly (eliminates command argument parsing bugs)
        jarsigner -keystore app/release-key.jks \
          -storepass:env KS_PASSWORD \
          -keypass:env K_PASSWORD \
          "$REAL_APK" \
          "$K_ALIAS"

        # 3. Create a clean folder for final outputs
        mkdir -p app/build/outputs/final-release/

        # 4. Align the signed APK into our final directory
        $ANDROID_HOME/build-tools/34.0.0/zipalign -f -v 4 "$REAL_APK" app/build/outputs/final-release/app-release-signed.apk

        # 5. Search the entire project directory for the generated AAB bundle file
        REAL_AAB=$(find . -name "*.aab" ! -path "*/intermediates/*" | head -n 1)
        echo "--> SUCCESS: Found AAB file at: $REAL_AAB"

        # 6. Sign the bundle target file
        jarsigner -keystore app/release-key.jks \
          -storepass:env KS_PASSWORD \
          -keypass:env K_PASSWORD \
          "$REAL_AAB" \
          "$K_ALIAS"

        # 7. Copy the signed bundle to our clean final output folder
        cp "$REAL_AAB" app/build/outputs/final-release/app-release-signed.aab

    # Uploads the final signed files directly from our clean final output folder
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK-Download
        path: app/build/outputs/final-release/app-release-signed.apk

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-Download
        path: app/build/outputs/final-release/app-release-signed.aab
