name: Build Signed Pure C++ APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

    # Passes secrets safely directly into the native Gradle signing system
    - name: Build and Sign with Gradle
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        gradle assembleRelease bundleRelease --stacktrace

    # Find and collect the final outputs neatly
    - name: Prepare Artifacts for Upload
      run: |
        mkdir -p final-artifacts/
        
        # Locate and copy the release APK
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" ! -name "*unsigned*" | head -n 1)
        if [ -n "$APK_PATH" ]; then cp "$APK_PATH" final-artifacts/app-release-signed.apk; fi
        
        # Locate and copy the release AAB bundle
        AAB_PATH=$(find app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
        if [ -n "$AAB_PATH" ]; then cp "$AAB_PATH" final-artifacts/app-release-signed.aab; fi

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK-Download
        path: final-artifacts/app-release-signed.apk

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-Download
        path: final-artifacts/app-release-signed.aab
