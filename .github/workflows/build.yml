name: Build Signed Pure C++ APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

    # Explicitly runs tasks through the central wrapper execution daemon
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    # Signs your binary artifacts cleanly from the standard build locations
    - name: Sign Android Outputs
      run: |
        # Sign APK
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks app/release-key.jks \
          --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          app/build/outputs/apk/release/app-release.apk

        # Sign AAB
        jarsigner -keystore app/release-key.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          app/build/outputs/bundle/release/app-release.aab \
          "${{ secrets.KEY_ALIAS }}"

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK-Download
        path: app/build/outputs/apk/release/app-release-signed.apk

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-Download
        path: app/build/outputs/bundle/release/app-release.aab
        
