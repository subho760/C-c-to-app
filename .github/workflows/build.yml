name: Build Signed Pure C++ APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

    # Compiles the workspace modules
    - name: Build with Gradle
      run: |
        gradle assembleRelease bundleRelease --stacktrace
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    # Dynamically finds and signs the outputs wherever they land
    - name: Sign Android Outputs
      run: |
        # 1. Dynamically locate the built APK file anywhere inside the build outputs (ignoring intermediate cache folders)
        REAL_APK=$(find app/build/outputs/apk/ -name "*.apk" ! -path "*/intermediates/*" | head -n 1)
        echo "Signing final APK located at: $REAL_APK"

        # 2. Sign the discovered APK target file
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks app/release-key.jks \
          --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          "$REAL_APK"

        # 3. Dynamically locate the bundle file inside the build outputs
        REAL_AAB=$(find app/build/outputs/bundle/ -name "*.aab" ! -path "*/intermediates/*" | head -n 1)
        echo "Signing final bundle located at: $REAL_AAB"

        # 4. Sign the discovered bundle target file in-place
        jarsigner -keystore app/release-key.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          "$REAL_AAB" \
          "${{ secrets.KEY_ALIAS }}"

    # Uploads using clean wildcard mapping filters
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK-Download
        path: "**/build/outputs/apk/release/*-signed.apk"

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-Download
        path: "**/build/outputs/bundle/**/*.aab"
