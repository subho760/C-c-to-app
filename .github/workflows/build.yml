name: Build Signed Pure C++ APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

    # Compiles everything and lists files so we can verify outputs
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew :app:assembleRelease :app:bundleRelease
        echo "=== Checking generated build outputs ==="
        ls -R app/build/outputs/ || echo "Outputs directory not found!"
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    # Dynamically scans and signs the outputs
    - name: Sign Android Outputs
      run: |
        RAW_APK=$(find app/build/outputs/ -name "*.apk" ! -name "*signed*" | head -n 1)
        echo "Found APK to sign: $RAW_APK"
        
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks app/release-key.jks \
          --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/app-release-signed.apk \
          "$RAW_APK"

        RAW_AAB=$(find app/build/outputs/ -name "*.aab" | head -n 1)
        echo "Found AAB to sign: $RAW_AAB"

        jarsigner -keystore app/release-key.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          "$RAW_AAB" \
          "${{ secrets.KEY_ALIAS }}"

    # Uploads the outputs to your summary page
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK-Download
        path: app/build/outputs/app-release-signed.apk

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-Download
        path: app/build/outputs/bundle/release/*.aab
        
