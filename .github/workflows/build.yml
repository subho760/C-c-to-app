name: Build Signed Pure C++ APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26b

    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

    # Force Gradle to run assemble and bundle tasks completely
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease bundleRelease --stacktrace
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

    # Dynamically locate and sign the built binary paths
    - name: Sign Android Outputs
      run: |
        # Locate the unsigned APK dynamically anywhere in the build tree
        RAW_APK=$(find . -name "*.apk" ! -name "*signed*" | head -n 1)
        echo "Found APK file at: $RAW_APK"
        
        # Sign the discovered APK
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks app/release-key.jks \
          --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out app/app-release-signed.apk \
          "$RAW_APK"

        # Locate the AAB file dynamically anywhere in the build tree
        RAW_AAB=$(find . -name "*.aab" | head -n 1)
        echo "Found AAB file at: $RAW_AAB"

        # Sign the discovered AAB
        jarsigner -keystore app/release-key.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          -keypass "${{ secrets.KEY_PASSWORD }}" \
          "$RAW_AAB" \
          "${{ secrets.KEY_ALIAS }}"

    # Upload files directly from the working paths
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-APK-Download
        path: app/app-release-signed.apk

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: Signed-AAB-Download
        path: "**/build/outputs/bundle/release/*.aab"
